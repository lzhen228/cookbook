# =============================================================================
# .github/workflows/deploy.yml — 单机生产部署
#
# 触发：push to main → rsync 代码到服务器 → docker compose up --build
#
# 所需 GitHub Secrets（Settings > Secrets and variables > Actions）：
#   PROD_SSH_PRIVATE_KEY      : GitHub Actions 用的 SSH 私钥（ed25519）
#   PROD_SERVER               : 服务器 IP，例如 47.94.120.15
#   PROD_USER                 : 登录用户名，例如 root
#   PROD_SERVER_KNOWN_HOSTS   : ssh-keyscan 输出的主机指纹行
# =============================================================================

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: '手动部署原因'
        required: false
        default: '手动触发'

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # 不取消正在进行的部署，排队等待

jobs:
  deploy:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "${{ secrets.PROD_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.PROD_SERVER_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          echo "[✓] SSH 配置完成"

      - name: Ensure rsync on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}" \
            "which rsync || dnf install -y rsync"
          echo "[✓] rsync 已就绪"

      - name: Ensure deploy directory on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}" \
            "mkdir -p /opt/cookbook"
          echo "[✓] 目录已就绪"

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='services/frontend/node_modules' \
            --exclude='services/frontend/dist' \
            --exclude='services/api/target' \
            --exclude='logs' \
            --exclude='.env.prod' \
            --exclude='.env.local' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./ \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}:/opt/cookbook/"
          echo "[✓] 代码同步完成 (commit: ${GITHUB_SHA::8})"

      - name: Write .env.prod on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}" \
            bash -s << EOF
          cat > /opt/cookbook/.env.prod << 'ENVEOF'
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_ACCESS_TOKEN_TTL_SECONDS=${{ secrets.JWT_ACCESS_TOKEN_TTL_SECONDS }}
          JWT_REFRESH_TOKEN_TTL_SECONDS=${{ secrets.JWT_REFRESH_TOKEN_TTL_SECONDS }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}
          KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          EXT_QICHA_API_KEY=${{ secrets.EXT_QICHA_API_KEY }}
          EXT_QICHA_BASE_URL=${{ secrets.EXT_QICHA_BASE_URL }}
          NOTIFY_WXBOT_WEBHOOK_URL=${{ secrets.NOTIFY_WXBOT_WEBHOOK_URL }}
          ENVEOF
          chmod 600 /opt/cookbook/.env.prod
          echo "[✓] .env.prod 已写入"
          EOF

      - name: Bootstrap PostgreSQL on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}" \
            bash -s << 'REMOTE'
          set -euo pipefail

          DB_NAME="${{ secrets.DB_NAME }}"
          DB_USER="${{ secrets.DB_USERNAME }}"
          DB_PASS="${{ secrets.DB_PASSWORD }}"

          echo "=== 初始化 PostgreSQL ==="

          # 创建用户（已存在则跳过）
          sudo -u postgres psql -tc \
            "SELECT 1 FROM pg_roles WHERE rolname='${DB_USER}'" | grep -q 1 \
            || sudo -u postgres psql -c \
               "CREATE USER ${DB_USER} WITH PASSWORD '${DB_PASS}';"

          # 创建数据库（已存在则跳过）
          sudo -u postgres psql -tc \
            "SELECT 1 FROM pg_database WHERE datname='${DB_NAME}'" | grep -q 1 \
            || sudo -u postgres psql -c \
               "CREATE DATABASE ${DB_NAME} OWNER ${DB_USER};"

          # 授权
          sudo -u postgres psql -c \
            "GRANT ALL PRIVILEGES ON DATABASE ${DB_NAME} TO ${DB_USER};"

          # 添加 Docker 网段访问权限（幂等）
          HBA=$(sudo -u postgres psql -t -c "SHOW hba_file;" | tr -d ' ')
          RULE="host    ${DB_NAME}    ${DB_USER}    172.17.0.0/16    md5"
          grep -qF "${DB_USER}" "$HBA" \
            || echo "$RULE" | sudo tee -a "$HBA" > /dev/null

          sudo systemctl reload postgresql || sudo service postgresql reload
          echo "[✓] PostgreSQL 初始化完成"
          REMOTE

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=30 \
            "${{ secrets.PROD_USER }}@${{ secrets.PROD_SERVER }}" \
            bash -s << 'REMOTE'
          set -euo pipefail
          cd /opt/cookbook

          echo "=== [1/2] 启动服务 ==="
          bash scripts/deploy-single-host.sh

          echo "=== [2/2] 验证容器状态 ==="
          sleep 10
          docker compose --env-file .env.prod -f docker-compose.prod.yml ps
          echo "✅ 部署完成"
          REMOTE

      - name: Print summary
        if: always()
        run: |
          echo "### 部署结果" >> $GITHUB_STEP_SUMMARY
          echo "| 字段 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 服务器 | ${{ secrets.PROD_SERVER }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${GITHUB_SHA::8} |" >> $GITHUB_STEP_SUMMARY
          echo "| 执行人 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 触发方式 | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
