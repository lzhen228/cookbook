version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: scrm-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # 生产环境不对外暴露端口，仅供 Docker 内网访问
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: scrm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    # 生产环境不对外暴露端口，仅供 Docker 内网访问
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./services/api
    container_name: scrm-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    extra_hosts:
      - "host-gateway:host-gateway"   # 让容器内可用 host-gateway 访问宿主机 pg
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: ${DB_HOST:-host-gateway}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL_SECONDS: ${JWT_ACCESS_TOKEN_TTL_SECONDS}
      JWT_REFRESH_TOKEN_TTL_SECONDS: ${JWT_REFRESH_TOKEN_TTL_SECONDS}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      EXT_QICHA_API_KEY: ${EXT_QICHA_API_KEY}
      EXT_QICHA_BASE_URL: ${EXT_QICHA_BASE_URL}
      NOTIFY_WXBOT_WEBHOOK_URL: ${NOTIFY_WXBOT_WEBHOOK_URL}
      APP_ENV: prod
      APP_LOG_LEVEL: INFO
    # 生产环境不对外暴露端口，通过 nginx（frontend）内网代理访问

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: scrm-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"

volumes:
  redis_data:
  minio_data:
