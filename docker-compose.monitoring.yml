version: "3.9"

# ============================================================
# SCRM 监控栈 — Prometheus + Grafana + Alertmanager + Exporters
#
# 使用方式：
#   启动监控栈：
#     docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
#   仅启动监控（依赖已运行的应用栈）：
#     docker-compose -f docker-compose.monitoring.yml up -d
#
# 环境变量（通过 .env.monitoring 文件管理，不提交 git）：
#   SMTP_HOST / SMTP_USERNAME / SMTP_PASSWORD
#   WECHAT_WEBHOOK_URL
#   ALERT_EMAIL_CRITICAL / ALERT_EMAIL_OPS / ALERT_EMAIL_DBA
#   GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD
# ============================================================

services:

  # ========== Prometheus ==========
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: scrm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"     # 数据保留 30 天
      - "--storage.tsdb.retention.size=50GB"    # 最大 50GB
      - "--web.enable-lifecycle"                # 支持 HTTP 热重载 (-X POST /-/reload)
      - "--web.enable-admin-api"
      - "--web.external-url=http://prometheus.company.com"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - monitoring
      - scrm-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Alertmanager ==========
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: scrm-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://alertmanager.company.com"
      - "--cluster.advertise-address=0.0.0.0:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager_data:/alertmanager
    environment:
      # 从环境变量注入敏感配置（不写入 alertmanager.yml）
      SMTP_HOST: ${SMTP_HOST}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      WECHAT_WEBHOOK_URL: ${WECHAT_WEBHOOK_URL}
      ALERT_EMAIL_CRITICAL: ${ALERT_EMAIL_CRITICAL:-sre@company.com}
      ALERT_EMAIL_OPS: ${ALERT_EMAIL_OPS:-ops@company.com}
      ALERT_EMAIL_DBA: ${ALERT_EMAIL_DBA:-dba@company.com}
    ports:
      - "9093:9093"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Grafana ==========
  grafana:
    image: grafana/grafana-oss:10.4.0
    container_name: scrm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: "http://grafana.company.com"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
      # 禁止匿名访问
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # 允许 iframe 嵌入（内部使用）
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      # 统一时区
      GF_DEFAULT_TIMEZONE: "Asia/Shanghai"
      # 禁用遥测
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      # Alerting 使用 Alertmanager 统一管理
      GF_ALERTING_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - monitoring
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========== Node Exporter（主机指标） ==========
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: scrm-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.netclass.ignored-devices=^(veth.*|docker.*|br-.*)$$"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring
    pid: host  # 需要宿主机 PID 命名空间
    deploy:
      mode: global  # 每个节点都部署

  # ========== PostgreSQL Exporter ==========
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: scrm-postgres-exporter
    restart: unless-stopped
    environment:
      # 连接字符串从 .env 注入
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME:-scrm_user}:${DB_PASSWORD:-scrm_dev_123}@postgres:5432/scrm?sslmode=disable"
      # 采集慢查询（pg_stat_statements 需要在 PG 侧开启）
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    ports:
      - "9187:9187"
    networks:
      - monitoring
      - scrm-network
    depends_on:
      - prometheus

  # ========== Redis Exporter ==========
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: scrm-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-scrm_dev_123}
      # 导出 Key 空间统计（命中率计算依赖）
      REDIS_EXPORTER_COUNT_KEYS: "true"
    ports:
      - "9121:9121"
    networks:
      - monitoring
      - scrm-network
    depends_on:
      - prometheus

  # ========== Kafka Exporter ==========
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: scrm-kafka-exporter
    restart: unless-stopped
    command:
      - "--kafka.server=kafka:9092"
      - "--kafka.version=3.6.0"
      - "--group.filter=.*"           # 监控所有消费组
      - "--topic.filter=supplier.*"   # 只监控 supplier 相关 topic
      - "--web.listen-address=:9308"
      - "--log.level=warn"
    ports:
      - "9308:9308"
    networks:
      - monitoring
      - scrm-network

networks:
  monitoring:
    name: scrm-monitoring
    driver: bridge
  scrm-network:
    external: true
    name: scrm-network   # 与主应用栈共享网络

volumes:
  prometheus_data:
    name: scrm-prometheus-data
  alertmanager_data:
    name: scrm-alertmanager-data
  grafana_data:
    name: scrm-grafana-data
